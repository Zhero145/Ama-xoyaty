<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Love ❤️</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Custom Audio Player & Floating Heart Design (Added here to keep style.css unchanged) */
        .custom-audio-player {
            display: flex;
            align-items: center;
            background: #fff;
            border: 3px solid #ffb6c1;
            border-radius: 50px;
            padding: 10px 20px;
            box-shadow: 0 6px 15px rgba(255, 105, 180, 0.3);
            margin: 10px auto;
            max-width: 280px;
        }

        .play-btn {
            font-size: 35px;
            cursor: pointer;
            margin-right: 15px;
            transition: transform 0.2s;
            user-select: none;
            filter: drop-shadow(0 2px 4px rgba(255, 105, 180, 0.4));
        }

        .play-btn:active {
            transform: scale(0.85);
        }

        .audio-progress {
            flex-grow: 1;
            height: 10px;
            background: #ffe4e1;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff99c2, #ff69b4);
            border-radius: 10px;
            transition: width 0.1s linear;
        }

        /* Floating Top Heart */
        .go-top-heart {
            position: fixed;
            bottom: 25px;
            right: 25px;
            font-size: 35px;
            cursor: pointer;
            background: #fff;
            border: 3px solid #ffb6c1;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(255, 105, 180, 0.4);
            z-index: 1000;
            transition: transform 0.3s, opacity 0.3s;
            opacity: 0;
            pointer-events: none;
            user-select: none;
        }

        .go-top-heart.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .go-top-heart:hover {
            transform: scale(1.1) translateY(-5px);
            border-color: #ff69b4;
        }
    </style>
</head>

<body>
    <div class="hearts-wrapper">
        <div class="heart h1">❤</div>
        <div class="heart h2">💖</div>
        <div class="heart h3">❤</div>
        <div class="heart h4">🎀</div>
        <div class="heart h5">❤</div>
    </div>

    <div class="container">
        <header>
            <h1>To My Beautiful My Girl 💖</h1>
        </header>
        <div class="content">

            <!-- Photo Slideshow Container -->
            <div class="slideshow-container">
                <video src="xoman.mp4" class="slide active" autoplay loop muted playsinline
                    style="object-fit: cover;"></video>
                <img src="2.png" alt="My Photo" class="slide">
                <!-- Fallback/additional photo for the slide effect -->
                <img src="3.png" alt="My Photo" class="slide">
                <img src="4.png" alt="My Photo" class="slide">
                <img src="5.png" alt="My Photo" class="slide">
                <img src="6.png" alt="My Photo" class="slide">
            </div>
            <h1 style="font-size: clamp(24px, 8vw, 40px); margin: 10px 0;">Baby Girl</h1>

            <div class="message-box">
                <p>You are the most amazing person in my life. Every moment with you is like a sweet dream come true. I
                    love you more than words can say! 🎀<br><br>Your Litlle Bear:
                    <span style="font-size: clamp(18px, 6vw, 25px);">Zhiro & Shera</span>
                </p>
                <p style="margin: 5px 0;">Be With Me Forever 💕</p>
            </div>

            <!-- Another cute Hello Kitty Gif -->

            <div class="audio-section">
                <p class="audio-text">Listen To This Voice: 💌</p>
                <!-- Custom Romantic Audio Player -->
                <div class="custom-audio-player">
                    <div class="play-btn" id="voicePlayBtn">❤️</div>
                    <div class="audio-progress" id="voiceProgressContainer">
                        <div class="progress-bar" id="voiceProgressBar"></div>
                    </div>
                </div>
                <audio id="voiceAudio" src="1.mp3" type="audio/mpeg"></audio>
                <h1 style="font-size: clamp(20px, 6vw, 30px); margin-top: 10px; margin-bottom: 0;">Xwa Tom Le Nasene,
                    Amin</h1>
            </div>
        </div>
    </div>

    <!-- Go to Top Floating Heart -->
    <div class="go-top-heart" id="goTopBtn" title="Go to Top">💖</div>

    <!-- Hidden Background Music Element (Not visible on the page) -->


    <!-- Link the JavaScript file for animations -->
    <script src="script.js"></script>
</body>


</html>
